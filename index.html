<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉应学院 A1 实验室项目管理系统</title>
<style>
    body{
    font-family: "Microsoft YaHei";
    background: linear-gradient(135deg,#141e30,#243b55);
    padding:40px;
    color:white;
}

h1{
    text-align:center;
    margin-bottom:40px;
    font-size:42px;
}

.banner{
    width:90%;
    max-width:900px;
    border-radius:20px;
    display:block;
    margin:20px auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding:25px;
    border-radius:20px;
    margin-bottom:25px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

h2{
    margin-top:0;
    color:#7ee7ff;
}

ul{
    line-height:2;
}

.progress{
    width:100%;
    height:28px;
    background:rgba(255,255,255,0.1);
    border-radius:30px;
    overflow:hidden;
    margin-top:20px;
}

.progress-bar{
    width:2%;
    height:100%;
    background: linear-gradient(90deg,#00ff87,#60efff);
    border-radius:30px;
    animation:load 2s;
}

@keyframes load{
    from{
        width:0;
    }
    to{
        width:2%;
    }
}

button{
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    border:none;
    padding:12px 28px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

input[type="file"]{
    margin-top:10px;
    color:white;
}

#result{
    margin-top:15px;
    color:#7CFFB2;
    font-weight:bold;
}

.banner{
    width:100%;
    max-width:900px;
    border-radius:20px;
    display:block;
    margin:20px auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
  </style>
</head>

<body>

  <h1>嘉应学院A1实验室项目管理系统</h1>
  <img src="国竣.png" class="banner">

  <div class="card">
    <h2>项目时间轴</h2>

    <ul>
      <li>2026年5月8日 A1实验室项目启动</li>
      <li>2026年5月底初步完成网页前端设计</li>
    </ul>
  </div>

  <div class="card">
    <h2>团队总进度</h2>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>

    <p>当前进度：2%</p>
  </div>

  <div class="card">
    <h2>上传日志</h2>

    <input type="file" id="fileInput">

    <br><br>

    <button onclick="uploadFile()">提交</button>

    <p id="result"></p>
</div>

<script>
function uploadFile(){

    let file = document.getElementById("fileInput").files[0];

    if(file){
        document.getElementById("result").innerHTML =
        "上传成功：" + file.name;
    }else{
        document.getElementById("result").innerHTML =
        "请先选择文件";
    }

}
</script>

</body>
</html>
