<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>嘉应学院A1实验室项目进程</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      padding:40px;
    }

    .card{
      background:#fff;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .progress{
      width:100%;
      height:25px;
      background:#ddd;
      border-radius:20px;
      overflow:hidden;
    }

    .progress-bar{
      width:2%;
      height:100%;
      background:#4caf50;
    }
  </style>
</head>

<body>

  <h1>实验室项目管理系统</h1>

  <div class="card">
    <h2>项目时间轴</h2>

    <ul>
      <li>2026年5月8日 A1实验室项目启动</li>
      <li>2026年5月底初步完成网页前端设计</li>
    </ul>
  </div>

  <div class="card">
    <h2>团队总进度</h2>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>

    <p>当前进度：2%</p>
  </div>

  <div class="card">
    <h2>上传日志</h2>

    <div class="card">
    <h3>请在下方选择您要上传的文件</h3>

    <input type="file" id="fileInput">

    <br><br>

    <button onclick="uploadFile()">提交</button>

    <p id="result"></p>
</div>

<script>
function uploadFile(){

    let file = document.getElementById("fileInput").files[0];

    if(file){
        document.getElementById("result").innerHTML =
        "上传成功：" + file.name;
    }else{
        document.getElementById("result").innerHTML =
        "请先选择文件";
    }

}
</script>
  </div>

</body>
</html>
