<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嘉应学院A1实验室项目管理系统</title>
<style>
/* 副标题渐变效果 */
.subtitle{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-top:-20px;
    margin-bottom:35px;
    letter-spacing:4px;
    background:linear-gradient(90deg,#00c6ff,#7ee7ff,#ffffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(0,198,255,0.5);
    animation:subtitleGlow 3s infinite alternate;
}
@keyframes subtitleGlow{
    0%{text-shadow:0 0 10px rgba(0,198,255,0.3);}
    50%{text-shadow:0 0 30px rgba(0,198,255,0.8);}
    100%{text-shadow:0 0 10px rgba(0,198,255,0.3);}
}

body{
    font-family: "Microsoft YaHei";
    background: linear-gradient(135deg,#141e30,#243b55);
    padding:20px 15px;
    color:white;
    margin:0;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:36px;
}

.banner{
    width:200px; /* 图片小一些 */
    max-width:90%;
    border-radius:20px;
    display:block;
    margin:20px auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

h2{
    margin-top:0;
    color:#7ee7ff;
}

ul{
    line-height:2;
}

.progress{
    width:100%;
    height:28px;
    background:rgba(255,255,255,0.1);
    border-radius:30px;
    overflow:hidden;
    margin-top:20px;
}

.progress-bar{
    width:2%;
    height:100%;
    background: linear-gradient(90deg,#00ff87,#60efff);
    border-radius:30px;
    animation:load 2s;
}

@keyframes load{from{width:0;} to{width:2%;}}

button{
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    border:none;
    padding:12px 28px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{transform:scale(1.05);}

input[type="file"], input[type="text"], input[type="password"]{
    width:90%;
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:16px;
}

#result{margin-top:15px;color:#7CFFB2;font-weight:bold;}

/* 登录框 */
.login-box{
    width:90%;
    max-width:360px;
    margin:100px auto 30px auto; /* 下移登录框 */
    padding:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    text-align:center;
    box-shadow:0 8px 30px rgba(185, 112, 112, 0.3);
}

#loginResult{margin-top:15px;font-weight:bold;}
#mainPage{display:none;}

/* 加载动画 */
#loadingBox{
    display:none;
    text-align:center;
    margin-top:25px;
}
#loadingCircle{
    width:70px;
    height:70px;
    border:6px solid rgba(255,255,255,0.2);
    border-top:6px solid #00ffcc;
    border-radius:50%;
    margin:0 auto;
    animation:spin 1s linear infinite;
}
#loadingText{
    margin-top:18px;
    font-size:20px;
    font-weight:bold;
}
@keyframes spin{from{transform:rotate(0deg);} to{transform:rotate(360deg);}}
@keyframes popSuccess{0%{transform:scale(0.5);opacity:0;} 70%{transform:scale(1.2);} 100%{transform:scale(1);opacity:1;}}
@keyframes shakeFail{0%{transform:translateX(0);}20%{transform:translateX(-10px);}40%{transform:translateX(10px);}60%{transform:translateX(-10px);}80%{transform:translateX(10px);}100%{transform:translateX(0);}}
@keyframes glow{0%{box-shadow:0 0 10px rgba(0,255,150,0.3);}50%{box-shadow:0 0 35px rgba(0,255,150,0.9);}100%{box-shadow:0 0 10px rgba(0,255,150,0.3);}}

/* 欢迎弹窗 */
#welcomeModal{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(62, 197, 234, 0.9);
    color:white;
    padding:15px 25px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
    opacity:0;
    transition:opacity 0.5s ease, top 0.5s ease;
    z-index:9999;
}
#welcomeModal.show{opacity:1; top:50px;}

/* 水印 */
#watermark{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:998;
    overflow:hidden;
}
.watermark-text{
    position:absolute;
    color: rgba(255,255,255,0.08);
    font-size:32px;
    font-weight:bold;
    transform:rotate(-25deg);
    user-select:none;
    white-space:nowrap;
}

/* 手机自适应 */
@media (max-width:480px){
    h1{font-size:28px;margin-bottom:20px;}
    .subtitle{font-size:18px;margin-top:-10px;margin-bottom:20px;}
    .login-box{padding:15px;margin:60px auto 20px auto;}
    button{font-size:14px;padding:10px 20px;}
    input[type="text"], input[type="password"], input[type="file"]{font-size:14px;padding:8px;}
    .card{padding:15px;margin-bottom:15px;}
    .watermark-text{font-size:20px;}
    #welcomeModal{font-size:16px;padding:10px 15px;}
    .banner{width:150px;}
}
</style>
</head>

<body>
<div id="watermark"></div>
<div id="welcomeModal"><p id="welcomeTextModal"></p></div>

<h1>嘉应学院 A1 实验室项目管理系统</h1>
<p class="subtitle">A1 Artificial Intelligence Laboratory In JYU</p>

<div class="login-box">
  <h2>系统登录</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="请输入账号">
    <input type="password" id="password" placeholder="请输入密码">
    <button onclick="login()" style="margin-top:20px;">登录</button>
  </form>
  <p id="loginResult"></p>
  <div id="loadingBox">
    <div id="loadingCircle"></div>
    <p id="loadingText"></p>
  </div>
</div>

<div id="mainPage">
    <img src="国竣.png" class="banner">
    <div class="card">
        <h2>项目时间轴</h2>
        <ul>
            <li>2026年5月8日 A1实验室项目启动</li>
            <li>2026年5月底初步完成网页前端设计</li>
            <li>2026年5月12日进行物理实验大赛《PCB缺陷检测的》初次彩排</li>
            <li>2026年5月15日进行物理实验大赛《PCB缺陷检测的》正式比赛</li>
            <li>2026年5月17日进行元老聚餐</li>
        </ul>
    </div>
    <div class="card">
        <h2>团队总进度</h2>
        <div class="progress"><div class="progress-bar"></div></div>
        <p>当前进度：2%</p>
    </div>
    <div class="card">
        <h2>上传日志</h2>
        <input type="file" id="fileInput">
        <br><br>
        <button onclick="uploadFile()">提交</button>
        <p id="result"></p>
    </div>
</div>

<script type="module">
  // Firebase SDK 引入
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

  // Firebase 配置
  const firebaseConfig = {
    apiKey: "AIzaSyB31NY9EnLbJMiYU5rwZJLV-j2xCHCAZEM",
    authDomain: "a1-lab-project.firebaseapp.com",
    projectId: "a1-lab-project",
    storageBucket: "a1-lab-project.firebasestorage.app",
    messagingSenderId: "642651867311",
    appId: "1:642651867311:web:3d76cbc99e5e2231ec2c5a",
    measurementId: "G-0X2HRZ9Y86"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const storage = getStorage(app);

  // 登录事件
  document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();
      login();
  });

  // 登录函数
  window.login = function(){
      let user = document.getElementById("username").value;
      let pass = document.getElementById("password").value;

      document.getElementById("loadingBox").style.display="block";
      document.getElementById("loadingCircle").innerHTML="";
      document.getElementById("loadingCircle").style.animation="spin 1s linear infinite";
      document.getElementById("loadingText").innerHTML="正在验证身份...";
      document.getElementById("loadingText").style.color="white";

      setTimeout(function(){
          let realName="";
          if(user=="Tonyfish" && pass=="87378822q") realName="范腾宇";
          else if(user=="king01" && pass=="king01.ABc") realName="刘镇";
          else if(user=="1" && pass=="1") realName="测试员";
          else if(user=="HBY大王666" && pass=="gary1204") realName="何滨彦";
          else if(user=="bin" && pass=="Lzb@20061025") realName="雷志彬";
          else if(user=="布加迪" && pass=="Aa681298") realName="连钢权";
          else if(user=="14750339695" && pass=="689695") realName="杜剑锐";
          else if(user=="泡菜鱼" && pass=="packchanyeol") realName="钟颖颖";
          else if(user=="nai" && pass=="123456") realName="徐国竣";

          if(realName!=""){
              document.getElementById("loadingCircle").style.animation="none";
              document.getElementById("loadingCircle").innerHTML="✓";
              document.getElementById("loadingCircle").style.display="flex";
              document.getElementById("loadingCircle").style.alignItems="center";
              document.getElementById("loadingCircle").style.justifyContent="center";
              document.getElementById("loadingCircle").style.fontSize="40px";
              document.getElementById("loadingCircle").style.color="#00ff99";
              document.getElementById("loadingCircle").style.borderTop="6px solid #00ff99";
              document.getElementById("loadingCircle").style.animation="popSuccess 0.6s ease, glow 1.5s infinite";
              document.getElementById("loadingCircle").style.boxShadow="0 0 30px #00ff99";

              document.getElementById("loadingText").innerHTML="登陆成功";
              document.getElementById("loadingText").style.color="#00ff99";

              setTimeout(function(){
                  document.querySelector(".login-box").style.display="none";
                  document.getElementById("mainPage").style.display="block";

                  // 弹窗显示
                  let modal=document.getElementById("welcomeModal");
                  let modalText=document.getElementById("welcomeTextModal");
                  modalText.innerHTML="欢迎您，"+realName;
                  modal.classList.add("show");

                  // 添加水印
                  createWatermark(realName);

                  setTimeout(function(){modal.classList.remove("show");},3000);

              },1500);
          }else{
              document.getElementById("loadingCircle").style.animation="none";
              document.getElementById("loadingCircle").innerHTML="×";
              document.getElementById("loadingCircle").style.display="flex";
              document.getElementById("loadingCircle").style.alignItems="center";
              document.getElementById("loadingCircle").style.justifyContent="center";
              document.getElementById("loadingCircle").style.fontSize="40px";
              document.getElementById("loadingCircle").style.color="red";
              document.getElementById("loadingCircle").style.borderTop="6px solid red";
              document.getElementById("loadingCircle").style.animation="shakeFail 0.5s";
              document.getElementById("loadingText").style.animation="shakeFail 0.5s";
              document.getElementById("loadingText").innerHTML="登陆失败 请重试";
              document.getElementById("loadingText").style.color="red";
          }
      },2000);
  }

  // 水印函数
  function createWatermark(name){
      let watermark=document.getElementById("watermark");
      watermark.innerHTML="";
      for(let i=0;i<20;i++){
          let text=document.createElement("div");
          text.className="watermark-text";
          text.innerHTML=name;
          text.style.left=(i%5)*25+"%";
          text.style.top=Math.floor(i/5)*25+"%";
          watermark.appendChild(text);
      }
  }

  // 上传文件函数
  window.uploadFile = function(){
      const file = document.getElementById("fileInput").files[0];
      const result = document.getElementById("result");

      if(!file){
          result.innerText = "请先选择文件";
          return;
      }

      const storageRef = ref(storage, "uploads/" + file.name);

      uploadBytes(storageRef, file)
          .then(snapshot => getDownloadURL(snapshot.ref))
          .then(url => {
              result.innerHTML = `上传成功！文件链接：<a href="${url}" target="_blank">${url}</a>`;
          })
          .catch(error => {
              result.innerText = "上传失败：" + error;
          });
  }
</script>

</body>
</html>
